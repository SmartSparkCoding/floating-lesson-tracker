<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jacob's School Timetable Countdown</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google%20Sands:wght@400;500;600;700&display=swap@" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="container">
    <div id="top-left">By Jacob N</div>
    <div id="week-toggle">
        <button id="weekA">Week A</button>
        <button id="weekB">Week B</button>
    </div>

    <div id="main-line">Loading :D</div>
    <div id="sub-line"></div>

    <div id="color-picker">
        <div>Top: <input type="color" id="pipTopColor"></div>
        <div>Bottom: <input type="color" id="pipBottomColor"></div>
        <div style="flex-basis:100%; text-align:center; font-size:0.8rem; margin-top:4px;">Change the Top and bottom colors of the PiP. They save to your local save!</div>
    </div>
</div>

<video id="pipVideo" muted autoplay playsinline></video>

<script src="script.js"></script>
</body>
</html>
